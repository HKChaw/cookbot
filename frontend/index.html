<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CookAssist — Hands-Free Cooking</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">🍳 CookAssist</div>
      <div class="header-actions">
        <button id="btn-new-recipe" class="btn btn-secondary">+ New Recipe</button>
      </div>
    </header>

    <!-- Main layout -->
    <main class="main">
      <!-- Left panel: recipe list + ingest -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-section">
          <h3>My Recipes</h3>
          <div id="recipe-list" class="recipe-list">
            <p class="empty-hint">No recipes yet. Add one below!</p>
          </div>
        </div>

        <!-- Ingest panel -->
        <div class="sidebar-section" id="ingest-panel">
          <h3>Add Recipe</h3>

          <div class="tabs">
            <button class="tab active" data-tab="text">Paste Text</button>
            <button class="tab" data-tab="url">Video URL</button>
            <button class="tab" data-tab="file">Upload File</button>
          </div>

          <!-- Text tab -->
          <div class="tab-content active" id="tab-text">
            <textarea id="ingest-text" placeholder="Paste recipe text here..." rows="6"></textarea>
            <button id="btn-ingest-text" class="btn btn-primary">Parse Recipe</button>
          </div>

          <!-- URL tab -->
          <div class="tab-content" id="tab-url">
            <input type="url" id="ingest-url" placeholder="https://youtube.com/watch?v=..." />
            <button id="btn-ingest-url" class="btn btn-primary">Process Video</button>
            <div id="url-status" class="status-box hidden"></div>
          </div>

          <!-- File tab -->
          <div class="tab-content" id="tab-file">
            <input type="file" id="ingest-file" accept=".txt,.pdf" />
            <button id="btn-ingest-file" class="btn btn-primary">Upload & Parse</button>
          </div>

          <div id="ingest-error" class="error-msg hidden"></div>
          <div id="ingest-loading" class="loading hidden">Processing...</div>
        </div>
      </aside>

      <!-- Center: chat -->
      <section class="chat-panel" id="chat-panel">
        <div id="chat-empty" class="chat-empty">
          <div class="empty-icon">👨‍🍳</div>
          <h2>Select a recipe to start cooking</h2>
          <p>I'll guide you step-by-step, hands-free.</p>
        </div>

        <div id="chat-active" class="hidden">
          <!-- Step progress bar -->
          <div class="step-bar" id="step-bar">
            <span id="step-label">Step 1 of ?</span>
            <div class="progress-track">
              <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
          </div>

          <!-- Current step card -->
          <div class="step-card" id="step-card">
            <div class="step-instruction" id="step-instruction">—</div>
            <div class="step-tips" id="step-tips"></div>
            <div class="step-ingredients" id="step-ingredients"></div>
          </div>

          <!-- Timers area -->
          <div class="timers-area" id="timers-area">
            <!-- Manual timer form -->
            <form id="manual-timer-form" class="manual-timer-form">
              <span class="timer-form-label">Set timer:</span>
              <input id="timer-h" type="number" min="0" max="23" placeholder="0h" />
              <input id="timer-m" type="number" min="0" max="59" placeholder="0m" />
              <input id="timer-s" type="number" min="0" max="59" placeholder="0s" />
              <input id="timer-label" type="text" placeholder="Label (optional)" />
              <button type="submit" class="btn btn-sm btn-primary">Start</button>
            </form>
            <!-- Active timers -->
            <div id="timers-container" class="timers-container hidden"></div>
          </div>

          <!-- Chat messages -->
          <div class="chat-messages" id="chat-messages"></div>

          <!-- Input -->
          <div class="chat-input-area">
            <div class="nav-hints">
              <span class="hint">🎙 "next step"</span>
              <span class="hint">🎙 "go back"</span>
              <span class="hint">🎙 "repeat"</span>
              <span class="hint">🎙 "how long does this take?"</span>
            </div>
            <div class="chat-input-row">
              <input type="text" id="chat-input" placeholder='Ask anything — or just speak...' autocomplete="off" />
              <button id="btn-send" class="btn btn-primary">Send</button>
              <button id="btn-mic" class="btn btn-icon hidden" title="Click to start voice input">🎤</button>
              <button id="btn-tts-toggle" class="btn btn-icon" title="Toggle voice readback">🔊</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Right panel: recipe detail -->
      <aside class="recipe-detail" id="recipe-detail">
        <div id="recipe-detail-empty" class="empty-hint">Select a recipe</div>
        <div id="recipe-detail-content" class="hidden">
          <h2 id="detail-title"></h2>
          <div class="detail-meta" id="detail-meta"></div>
          <h4>Ingredients</h4>
          <ul id="detail-ingredients"></ul>
          <h4>Steps</h4>
          <ol id="detail-steps"></ol>
          <button id="btn-start-cooking" class="btn btn-primary btn-full">Start Cooking</button>
        </div>
      </aside>
    </main>
  </div>

  <script type="module" src="/static/js/voice.js"></script>
  <script type="module" src="/static/js/api.js"></script>
  <script type="module" src="/static/js/recipe.js"></script>
  <script type="module" src="/static/js/ingest.js"></script>
  <script type="module" src="/static/js/timer.js"></script>
  <script type="module" src="/static/js/tts.js"></script>
  <script type="module" src="/static/js/chat.js"></script>
  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
